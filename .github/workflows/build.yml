name: build

# Build prebuilt mnemo binaries for macOS / Linux / Windows on every push to
# main (artifacts kept 14 days for PR validation), and publish a GitHub
# Release with all four binaries + SHA256SUMS + install scripts whenever a
# v*.*.* tag is pushed.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch: {}
  pull_request:
    branches: [main]

permissions:
  contents: write  # needed for the release job to upload assets

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
            artifact_name: mnemo-darwin-arm64
            binary_path: dist/mnemo
          - target: darwin-x86_64
            runner: macos-13
            artifact_name: mnemo-darwin-x86_64
            binary_path: dist/mnemo
          - target: linux-x86_64
            runner: ubuntu-22.04
            artifact_name: mnemo-linux-x86_64
            binary_path: dist/mnemo
          - target: windows-x86_64
            runner: windows-latest
            artifact_name: mnemo-windows-x86_64.exe
            binary_path: dist/mnemo.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: python -m PyInstaller mnemo.spec --noconfirm --clean

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p out
          cp "${{ matrix.binary_path }}" "out/${{ matrix.artifact_name }}"
          ls -lh out/

      # ---- smoke test: prove the binary actually starts ------------------
      - name: Smoke test (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x "out/${{ matrix.artifact_name }}"
          "./out/${{ matrix.artifact_name }}" --help > /dev/null
          "./out/${{ matrix.artifact_name }}" --version || true
          "./out/${{ matrix.artifact_name }}" search --help > /dev/null
          "./out/${{ matrix.artifact_name }}" setup --dry-run --no-project-prompts || true

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "out/${{ matrix.artifact_name }}" --help | Out-Null
          & "out/${{ matrix.artifact_name }}" --version
          & "out/${{ matrix.artifact_name }}" search --help | Out-Null
          & "out/${{ matrix.artifact_name }}" setup --dry-run --no-project-prompts

      - name: Compute SHA256
        shell: bash
        run: |
          cd out
          if command -v sha256sum >/dev/null; then
            sha256sum "${{ matrix.artifact_name }}" > "${{ matrix.artifact_name }}.sha256"
          else
            shasum -a 256 "${{ matrix.artifact_name }}" > "${{ matrix.artifact_name }}.sha256"
          fi
          cat "${{ matrix.artifact_name }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            out/${{ matrix.artifact_name }}
            out/${{ matrix.artifact_name }}.sha256
          retention-days: 14
          if-no-files-found: error

  release:
    name: release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout (for install scripts)
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Stage release files
        shell: bash
        run: |
          mkdir -p release
          # Move every binary + its sha256 into the release dir
          find artifacts -type f \( -name "mnemo-*" \) -exec cp -v {} release/ \;
          # Combine per-asset .sha256 files into one SHA256SUMS
          (cd release && cat mnemo-*.sha256 > SHA256SUMS && rm mnemo-*.sha256)
          # Install scripts go in the release too so install.sh / install.ps1
          # can be downloaded by URL alongside the binaries.
          cp scripts/install.sh release/install.sh
          cp scripts/install.ps1 release/install.ps1
          ls -lh release/
          cat release/SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
