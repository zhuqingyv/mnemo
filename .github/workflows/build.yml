name: build

# Build prebuilt mnemo binaries for macOS / Linux / Windows on every push to
# main (artifacts kept 14 days for PR validation), and publish a GitHub
# Release with all six binaries + SHA256SUMS + install scripts + desktop
# installers whenever a v*.*.* tag is pushed.
#
# Supported platforms (6):
#   - darwin-arm64   (macOS Apple Silicon)
#   - darwin-x86_64  (macOS Intel)
#   - linux-x86_64   (Linux x86_64)
#   - linux-arm64    (Linux ARM64)
#   - windows-x86_64 (Windows x86_64)
#   - windows-arm64  (Windows ARM64)

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch: {}
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Stage 1: Build CLI binaries via PyInstaller (6 platforms)
  # ─────────────────────────────────────────────────────────────
  build-cli:
    name: cli (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
            artifact_name: mnemo-darwin-arm64
            binary_path: dist/mnemo
          - target: darwin-x86_64
            runner: macos-13
            artifact_name: mnemo-darwin-x86_64
            binary_path: dist/mnemo
          - target: linux-x86_64
            runner: ubuntu-22.04
            artifact_name: mnemo-linux-x86_64
            binary_path: dist/mnemo
          - target: linux-arm64
            runner: ubuntu-22.04-arm
            artifact_name: mnemo-linux-arm64
            binary_path: dist/mnemo
          - target: windows-x86_64
            runner: windows-latest
            artifact_name: mnemo-windows-x86_64.exe
            binary_path: dist/mnemo.exe
          - target: windows-arm64
            runner: windows-11-arm
            artifact_name: mnemo-windows-arm64.exe
            binary_path: dist/mnemo.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Build sqlite-vec for Windows ARM64
        if: matrix.target == 'windows-arm64'
        shell: bash
        run: |
          # Checkout sqlite-vec v0.1.9
          git clone --depth 1 --branch v0.1.9 https://github.com/asg017/sqlite-vec.git sqlite-vec-src
          cd sqlite-vec-src

          # Vendor dependencies
          ./scripts/vendor.sh

          # Generate header - try make first, fall back to manual generation
          if command -v make >/dev/null 2>&1; then
            make sqlite-vec.h
          else
            echo "make not found, attempting to generate sqlite-vec.h manually"
            # Try using python to generate the header if there's a script
            if [ -f "scripts/generate_header.py" ]; then
              python scripts/generate_header.py
            elif [ -f "generate.py" ]; then
              python generate.py
            else
              echo "Warning: Could not generate sqlite-vec.h, may cause compilation issues"
            fi
          fi

          # Setup MSVC environment for Windows ARM64
          # The windows-11-arm runner should have MSVC pre-installed for ARM64
          # Try to compile with MSVC for ARM64 architecture
          echo "Compiling with MSVC for ARM64 architecture..."
          # Note: /fPIC may not be valid for MSVC, but upstream uses it
          # Add /arch:ARM64 for ARM64 target
          # Try to compile - if cl.exe is not in PATH, this will fail
          cl.exe /fPIC -shared /W4 /Ivendor/ /O2 /LD /arch:ARM64 sqlite-vec.c -o vec0.dll || {
            echo "First compilation attempt failed, trying without /arch:ARM64 flag..."
            # Try without /arch:ARM64 flag
            cl.exe /fPIC -shared /W4 /Ivendor/ /O2 /LD sqlite-vec.c -o vec0.dll
          }

          # Create local sqlite_vec package
          mkdir -p ../sqlite_vec_pkg/sqlite_vec
          cp vec0.dll ../sqlite_vec_pkg/sqlite_vec/

          # Create __init__.py (compatible with original)
          cat > ../sqlite_vec_pkg/sqlite_vec/__init__.py << 'EOF'
          from os import path
          import sqlite3

          __version__ = "0.1.9"
          __version_info__ = tuple(__version__.split("."))

          def loadable_path():
              loadable_path = path.join(path.dirname(__file__), "vec0")
              return path.normpath(loadable_path)

          def load(conn: sqlite3.Connection) -> None:
              conn.load_extension(loadable_path())

          from typing import List
          from struct import pack

          def serialize_float32(vector: List[float]) -> bytes:
              return pack("%sf" % len(vector), *vector)

          def serialize_int8(vector: List[int]) -> bytes:
              return pack("%sb" % len(vector), *vector)

          # Optional numpy support (stub)
          try:
              import numpy.typing as npt
              def register_numpy(db: sqlite3.Connection, name: str, array: npt.NDArray):
                  raise NotImplementedError("numpy support not compiled for Windows ARM64")
          except ImportError:
              def register_numpy(db: sqlite3.Connection, name: str, array):
                  raise Exception("numpy package is required for register_numpy")
          EOF

          # Create setup.py for local package
          cat > ../sqlite_vec_pkg/setup.py << 'EOF'
          from setuptools import setup, find_packages
          setup(
              name="sqlite-vec",
              version="0.1.9",
              packages=find_packages(),
              package_data={"sqlite_vec": ["vec0.dll"]},
              include_package_data=True,
          )
          EOF

          # Install the local package
          cd ../sqlite_vec_pkg
          pip install .

      - name: Install build deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: python -m PyInstaller mnemo.spec --noconfirm --clean

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p out
          cp "${{ matrix.binary_path }}" "out/${{ matrix.artifact_name }}"
          ls -lh out/

      - name: Smoke test (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x "out/${{ matrix.artifact_name }}"
          "./out/${{ matrix.artifact_name }}" --help > /dev/null
          "./out/${{ matrix.artifact_name }}" --version || true
          "./out/${{ matrix.artifact_name }}" search --help > /dev/null
          "./out/${{ matrix.artifact_name }}" setup --dry-run --no-project-prompts || true

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "out/${{ matrix.artifact_name }}" --help | Out-Null
          & "out/${{ matrix.artifact_name }}" --version
          & "out/${{ matrix.artifact_name }}" search --help | Out-Null
          & "out/${{ matrix.artifact_name }}" setup --dry-run --no-project-prompts

      - name: Compute SHA256
        shell: bash
        run: |
          cd out
          if command -v sha256sum >/dev/null; then
            sha256sum "${{ matrix.artifact_name }}" > "${{ matrix.artifact_name }}.sha256"
          else
            shasum -a 256 "${{ matrix.artifact_name }}" > "${{ matrix.artifact_name }}.sha256"
          fi
          cat "${{ matrix.artifact_name }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            out/${{ matrix.artifact_name }}
            out/${{ matrix.artifact_name }}.sha256
          retention-days: 14
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────
  # Stage 2: Build Tauri desktop installers (6 targets)
  # Depends on Stage 1 for the platform-matching mnemo binary
  # ─────────────────────────────────────────────────────────────
  build-desktop:
    name: desktop (${{ matrix.target }})
    needs: build-cli
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            runner: macos-14
            cli_artifact: mnemo-darwin-arm64
            binary_name: mnemo
            desktop_label: macos-arm64
          # macOS Intel
          - target: x86_64-apple-darwin
            runner: macos-13
            cli_artifact: mnemo-darwin-x86_64
            binary_name: mnemo
            desktop_label: macos-x86_64
          # Linux x86_64
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            cli_artifact: mnemo-linux-x86_64
            binary_name: mnemo
            desktop_label: linux-x86_64
          # Linux ARM64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
            cli_artifact: mnemo-linux-arm64
            binary_name: mnemo
            desktop_label: linux-arm64
          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            cli_artifact: mnemo-windows-x86_64.exe
            binary_name: mnemo.exe
            desktop_label: windows-x86_64
          # Windows ARM64
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            cli_artifact: mnemo-windows-arm64.exe
            binary_name: mnemo.exe
            desktop_label: windows-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Download the matching CLI binary from Stage 1
      - name: Download CLI binary
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.cli_artifact }}
          path: cli-artifacts

      # Inject the platform-specific mnemo binary into resources/
      # Clean first to avoid shipping wrong-platform binaries in the bundle.
      - name: Inject mnemo binary for target platform
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/resources
          rm -f desktop/src-tauri/resources/*
          cp "cli-artifacts/${{ matrix.cli_artifact }}" "desktop/src-tauri/resources/${{ matrix.binary_name }}"
          chmod +x "desktop/src-tauri/resources/${{ matrix.binary_name }}" 2>/dev/null || true
          ls -lh "desktop/src-tauri/resources/"

      # ── Frontend: pnpm ──
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          package_json_file: desktop/package.json

      - name: Install frontend deps
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      # ── Rust toolchain ──
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target
          key: ${{ matrix.target }}

      # ── Linux system deps (required by Tauri / webkit2gtk) ──
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # ── Tauri build ──
      - name: Tauri build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          args: --target ${{ matrix.target }}

      # ── Collect & rename desktop artifacts ──
      # tauri-action drops bundles into target/${target}/release/bundle/
      # We rename them to a unified scheme so the Release page is clean.
      - name: Collect desktop artifacts
        shell: bash
        run: |
          mkdir -p desktop-out
          BUNDLE_DIR="desktop/src-tauri/target/${{ matrix.target }}/release/bundle"

          # macOS — .dmg
          if [ -d "$BUNDLE_DIR/dmg" ]; then
            find "$BUNDLE_DIR/dmg" -name "*.dmg" -exec cp {} desktop-out/ \;
          fi
          # macOS — .app.tar.gz
          if [ -d "$BUNDLE_DIR/macos" ]; then
            find "$BUNDLE_DIR/macos" -name "*.app.tar.gz" -exec cp {} desktop-out/ \;
          fi

          # Linux — .deb
          if [ -d "$BUNDLE_DIR/deb" ]; then
            find "$BUNDLE_DIR/deb" -name "*.deb" -exec cp {} desktop-out/ \;
          fi
          # Linux — .AppImage
          if [ -d "$BUNDLE_DIR/appimage" ]; then
            find "$BUNDLE_DIR/appimage" -name "*.AppImage" -exec cp {} desktop-out/ \;
          fi
          # Linux — .rpm
          if [ -d "$BUNDLE_DIR/rpm" ]; then
            find "$BUNDLE_DIR/rpm" -name "*.rpm" -exec cp {} desktop-out/ \;
          fi

          # Windows — .exe (NSIS installer)
          if [ -d "$BUNDLE_DIR/nsis" ]; then
            find "$BUNDLE_DIR/nsis" -name "*.exe" -exec cp {} desktop-out/ \;
          fi
          # Windows — .msi
          if [ -d "$BUNDLE_DIR/msi" ]; then
            find "$BUNDLE_DIR/msi" -name "*.msi" -exec cp {} desktop-out/ \;
          fi

          # Rename to unified naming: mnemo-desktop-{label}.{ext}
          cd desktop-out
          for f in *; do
            ext="${f##*.}"
            mv "$f" "mnemo-desktop-${{ matrix.desktop_label }}.${ext}"
          done
          ls -lh desktop-out/

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mnemo-desktop-${{ matrix.desktop_label }}
          path: desktop-out/*
          retention-days: 14
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────
  # Stage 3: Publish GitHub Release (only on v*.*.* tags)
  # ─────────────────────────────────────────────────────────────
  release:
    name: release
    needs: [build-cli, build-desktop]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout (for install scripts)
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Stage release files
        shell: bash
        run: |
          mkdir -p release

          # ── CLI binaries + SHA256SUMS ──
          find artifacts -type f \( -name "mnemo-darwin-*" -o -name "mnemo-linux-*" -o -name "mnemo-windows-*" \) -exec cp -v {} release/ \;

          # Combine per-asset .sha256 files into one SHA256SUMS
          (cd release && cat mnemo-*.sha256 > SHA256SUMS 2>/dev/null && rm -f mnemo-*.sha256 || true)

          # ── Install scripts ──
          cp scripts/install.sh release/install.sh
          cp scripts/install.ps1 release/install.ps1

          # ── Desktop installers ──
          find artifacts -type f \( -name "mnemo-desktop-*" \) -exec cp -v {} release/ \;

          # Summary
          echo "=== Release contents ==="
          ls -lh release/
          echo "========================"
          [ -f release/SHA256SUMS ] && cat release/SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
