name: build

# Build prebuilt mnemo binaries for macOS / Linux / Windows on every push to
# main (artifacts kept 14 days for PR validation), and publish a GitHub
# Release with all six binaries + SHA256SUMS + install scripts + desktop
# installers whenever a v*.*.* tag is pushed.
#
# Supported platforms (6):
#   - darwin-arm64   (macOS Apple Silicon)
#   - darwin-x86_64  (macOS Intel)
#   - linux-x86_64   (Linux x86_64)
#   - linux-arm64    (Linux ARM64)
#   - windows-x86_64 (Windows x86_64)
#   - windows-arm64  (Windows ARM64)

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch: {}
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Stage 1: Build CLI binaries via PyInstaller (6 platforms)
  # ─────────────────────────────────────────────────────────────
  build-cli:
    name: cli (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
            artifact_name: mnemo-darwin-arm64
            binary_path: dist/mnemo
            experimental: false
          - target: darwin-x86_64
            runner: macos-14
            artifact_name: mnemo-darwin-x86_64
            binary_path: dist/mnemo
            experimental: false
          - target: linux-x86_64
            runner: ubuntu-22.04
            artifact_name: mnemo-linux-x86_64
            binary_path: dist/mnemo
            experimental: false
          - target: linux-arm64
            runner: ubuntu-22.04-arm
            artifact_name: mnemo-linux-arm64
            binary_path: dist/mnemo
            experimental: true
          - target: windows-x86_64
            runner: windows-latest
            artifact_name: mnemo-windows-x86_64.exe
            binary_path: dist/mnemo.exe
            experimental: false
          - target: windows-arm64
            runner: windows-11-arm
            artifact_name: mnemo-windows-arm64.exe
            binary_path: dist/mnemo.exe
            experimental: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Rosetta (macOS ARM → x86_64 cross-build)
        if: matrix.target == 'darwin-x86_64' && runner.arch == 'ARM64'
        run: softwareupdate --install-rosetta --agree-to-license || true

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: ${{ matrix.target == 'darwin-x86_64' && 'x64' || '' }}
          cache: pip

      - name: Build sqlite-vec for Windows ARM64
        if: matrix.target == 'windows-arm64'
        shell: pwsh
        run: |
          git clone --depth 1 --branch v0.1.9 https://github.com/asg017/sqlite-vec.git sqlite-vec-src
          Push-Location sqlite-vec-src

          # Vendor dependencies (uses bash via Git for Windows)
          & "C:\Program Files\Git\bin\bash.exe" -c "./scripts/vendor.sh"

          # Generate sqlite-vec.h via make (Git for Windows includes make)
          & "C:\Program Files\Git\bin\bash.exe" -c "make sqlite-vec.h"

          # Find and invoke vcvarsall for ARM64
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -property installationPath
          $vcvarsall = Join-Path $vsPath "VC\Auxiliary\Build\vcvarsall.bat"
          if (-not (Test-Path $vcvarsall)) { throw "vcvarsall.bat not found at $vcvarsall" }

          # Compile sqlite-vec.c into vec0.dll targeting ARM64
          $compileCmd = "`"$vcvarsall`" arm64 && cl /W4 /Ivendor/ /O2 /LD sqlite-vec.c /Fe:vec0.dll /link /DLL"
          cmd /c $compileCmd
          if ($LASTEXITCODE -ne 0) { throw "sqlite-vec compilation failed" }
          if (-not (Test-Path "vec0.dll")) { throw "vec0.dll not produced" }

          Pop-Location

      - name: Package sqlite-vec for Windows ARM64
        if: matrix.target == 'windows-arm64'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path sqlite_vec_pkg/sqlite_vec | Out-Null
          Copy-Item sqlite-vec-src/vec0.dll sqlite_vec_pkg/sqlite_vec/

          @"
          from os import path
          import sqlite3

          __version__ = "0.1.9"
          __version_info__ = tuple(__version__.split("."))

          def loadable_path():
              return path.normpath(path.join(path.dirname(__file__), "vec0"))

          def load(conn: sqlite3.Connection) -> None:
              conn.load_extension(loadable_path())

          from typing import List
          from struct import pack

          def serialize_float32(vector: List[float]) -> bytes:
              return pack("%sf" % len(vector), *vector)

          def serialize_int8(vector: List[int]) -> bytes:
              return pack("%sb" % len(vector), *vector)
          "@ | Set-Content -Path sqlite_vec_pkg/sqlite_vec/__init__.py

          @"
          from setuptools import setup, find_packages
          setup(
              name="sqlite-vec",
              version="0.1.9",
              packages=find_packages(),
              package_data={"sqlite_vec": ["vec0.dll"]},
              include_package_data=True,
          )
          "@ | Set-Content -Path sqlite_vec_pkg/setup.py

          Push-Location sqlite_vec_pkg
          pip install .
          Pop-Location

      - name: Install build deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: python -m PyInstaller mnemo.spec --noconfirm --clean

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p out
          cp "${{ matrix.binary_path }}" "out/${{ matrix.artifact_name }}"
          ls -lh out/

      - name: Smoke test (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -uo pipefail
          BIN="./out/${{ matrix.artifact_name }}"
          chmod +x "$BIN"
          export HOME="$RUNNER_TEMP/mnemo-home"
          export MNEMO_DATA_DIR="$RUNNER_TEMP/mnemo-data"
          export NO_COLOR=1
          mkdir -p "$HOME" "$MNEMO_DATA_DIR"
          FAIL=0

          echo "::group::env diagnostics"
          echo "COLUMNS=${COLUMNS:-<unset>} TERM=${TERM:-<unset>}"
          echo "HOME=$HOME MNEMO_DATA_DIR=$MNEMO_DATA_DIR"
          echo "::endgroup::"

          echo "--- [1/6] --help ---"
          "$BIN" --help > /dev/null 2>&1 || { echo "FAIL: --help exit=$?"; FAIL=1; }

          echo "--- [2/6] --version ---"
          "$BIN" --version 2>&1 || { echo "FAIL: --version exit=$?"; FAIL=1; }

          echo "--- [3/6] search --help ---"
          "$BIN" search --help > /dev/null 2>&1 || { echo "FAIL: search --help exit=$?"; FAIL=1; }

          echo "--- [4/6] setup --help (checking --mcp-only) ---"
          SETUP_HELP_RAW=$("$BIN" setup --help 2>&1)
          SETUP_HELP_EXIT=$?
          SETUP_HELP=$(printf '%s' "$SETUP_HELP_RAW" | sed $'s/\x1b\\[[0-9;]*m//g')
          if [ $SETUP_HELP_EXIT -ne 0 ]; then
            echo "FAIL: setup --help exit=$SETUP_HELP_EXIT"
            echo "$SETUP_HELP_RAW"
            FAIL=1
          elif ! echo "$SETUP_HELP" | grep -q -- "--mcp-only"; then
            echo "FAIL: --mcp-only not found in setup --help output:"
            echo "$SETUP_HELP_RAW"
            FAIL=1
          else
            echo "OK: found --mcp-only"
          fi

          echo "--- [5/6] serve --help ---"
          "$BIN" serve --help > /dev/null 2>&1 || { echo "FAIL: serve --help exit=$?"; FAIL=1; }

          echo "--- [6/6] setup --dry-run ---"
          DRYRUN_OUT=$("$BIN" setup --dry-run --no-project-prompts --mcp-only 2>&1)
          DRYRUN_EXIT=$?
          echo "$DRYRUN_OUT"
          if [ $DRYRUN_EXIT -ne 0 ]; then
            echo "FAIL: setup --dry-run exit=$DRYRUN_EXIT"
            FAIL=1
          fi

          if [ $FAIL -ne 0 ]; then
            echo "::error::Smoke test failed — see logs above for details"
            exit 1
          fi
          echo "All smoke tests passed."

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:USERPROFILE = Join-Path $env:RUNNER_TEMP "mnemo-home"
          $env:MNEMO_DATA_DIR = Join-Path $env:RUNNER_TEMP "mnemo-data"
          New-Item -ItemType Directory -Force -Path $env:USERPROFILE | Out-Null
          New-Item -ItemType Directory -Force -Path $env:MNEMO_DATA_DIR | Out-Null
          & "out/${{ matrix.artifact_name }}" --help | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "mnemo --help failed" }
          & "out/${{ matrix.artifact_name }}" --version
          if ($LASTEXITCODE -ne 0) { throw "mnemo --version failed" }
          & "out/${{ matrix.artifact_name }}" search --help | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "mnemo search --help failed" }
          $setupHelp = (& "out/${{ matrix.artifact_name }}" setup --help) | Out-String
          if ($LASTEXITCODE -ne 0) { throw "mnemo setup --help failed" }
          if ($setupHelp -notmatch "--mcp-only") { throw "setup --help does not include --mcp-only" }
          & "out/${{ matrix.artifact_name }}" serve --help | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "mnemo serve --help failed" }
          & "out/${{ matrix.artifact_name }}" setup --dry-run --no-project-prompts --mcp-only
          if ($LASTEXITCODE -ne 0) { throw "mnemo setup --dry-run failed" }

      - name: Compute SHA256
        shell: bash
        run: |
          cd out
          if command -v sha256sum >/dev/null; then
            sha256sum "${{ matrix.artifact_name }}" > "${{ matrix.artifact_name }}.sha256"
          else
            shasum -a 256 "${{ matrix.artifact_name }}" > "${{ matrix.artifact_name }}.sha256"
          fi
          cat "${{ matrix.artifact_name }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            out/${{ matrix.artifact_name }}
            out/${{ matrix.artifact_name }}.sha256
          retention-days: 14
          if-no-files-found: error

      - name: Write CLI platform summary
        if: always()
        shell: bash
        run: |
          {
            echo "## CLI ${{ matrix.target }}"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Artifact | \`${{ matrix.artifact_name }}\` |"
            echo "| Runner | \`${{ matrix.runner }}\` |"
            echo "| Experimental | \`${{ matrix.experimental }}\` |"
            echo "| Job status | \`${{ job.status }}\` |"
            echo ""
            if [ "${{ matrix.experimental }}" = "true" ]; then
              echo "This platform is best-effort and does not block the website/release download path."
              echo ""
              case "${{ matrix.target }}" in
                linux-arm64)
                  echo "Likely failure causes: GitHub ARM runner availability, PyInstaller/native sqlite-vec dependency differences, or platform-specific smoke-test runtime errors."
                  ;;
                windows-arm64)
                  echo "Likely failure causes: sqlite-vec has no stable Windows ARM64 wheel here, and the current fallback native build needs a correctly initialized MSVC ARM64 environment."
                  ;;
              esac
              echo ""
              echo "If this job failed, inspect the failed step logs above for the exact error."
            else
              echo "This is a core download platform. Failure blocks release readiness."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────
  # Stage 2: Build Tauri desktop installers (6 targets)
  # Depends on Stage 1 for the platform-matching mnemo binary
  # ─────────────────────────────────────────────────────────────
  build-desktop:
    name: desktop (${{ matrix.target }})
    needs: build-cli
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            runner: macos-14
            cli_artifact: mnemo-darwin-arm64
            binary_name: mnemo
            desktop_label: macos-arm64
          # macOS Intel (cross-compile on ARM runner via Rosetta)
          - target: x86_64-apple-darwin
            runner: macos-14
            cli_artifact: mnemo-darwin-x86_64
            binary_name: mnemo
            desktop_label: macos-x86_64
          # Linux x86_64
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            cli_artifact: mnemo-linux-x86_64
            binary_name: mnemo
            desktop_label: linux-x86_64
          # Linux ARM64
          # Experimental CLI-only until runner/native dependency stability is proven.
          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            cli_artifact: mnemo-windows-x86_64.exe
            binary_name: mnemo.exe
            desktop_label: windows-x86_64
          # Windows ARM64
          # Experimental CLI-only until sqlite-vec ARM64 packaging is proven.

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Download the matching CLI binary from Stage 1
      - name: Download CLI binary
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.cli_artifact }}
          path: cli-artifacts

      # Inject the platform-specific mnemo binary into resources/
      # Clean first to avoid shipping wrong-platform binaries in the bundle.
      - name: Inject mnemo binary for target platform
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/resources
          rm -f desktop/src-tauri/resources/*
          cp "cli-artifacts/${{ matrix.cli_artifact }}" "desktop/src-tauri/resources/${{ matrix.binary_name }}"
          chmod +x "desktop/src-tauri/resources/${{ matrix.binary_name }}" 2>/dev/null || true
          ls -lh "desktop/src-tauri/resources/"

      - name: Validate bundled mnemo resource (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN="desktop/src-tauri/resources/${{ matrix.binary_name }}"
          chmod +x "$BIN"
          "$BIN" --help > /dev/null
          "$BIN" --version
          "$BIN" setup --help 2>&1 | sed $'s/\x1b\\[[0-9;]*m//g' | grep -- --mcp-only
          "$BIN" serve --help > /dev/null

      - name: Validate bundled mnemo resource (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "desktop/src-tauri/resources/${{ matrix.binary_name }}"
          & $bin --help | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "bundled mnemo --help failed" }
          & $bin --version
          if ($LASTEXITCODE -ne 0) { throw "bundled mnemo --version failed" }
          $setupHelp = (& $bin setup --help) | Out-String
          if ($LASTEXITCODE -ne 0) { throw "bundled mnemo setup --help failed" }
          if ($setupHelp -notmatch "--mcp-only") { throw "setup --help does not include --mcp-only" }
          & $bin serve --help | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "bundled mnemo serve --help failed" }

      # ── Frontend: pnpm ──
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          package_json_file: desktop/package.json

      - name: Install frontend deps
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      # ── Rust toolchain ──
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target
          key: ${{ matrix.target }}

      # ── Linux system deps (required by Tauri / webkit2gtk) ──
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # ── Tauri build ──
      - name: Tauri build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          args: --target ${{ matrix.target }}

      # ── Collect & rename desktop artifacts ──
      # tauri-action drops bundles into target/${target}/release/bundle/
      # We rename them to a unified scheme so the Release page is clean.
      - name: Collect desktop artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p desktop-out
          BUNDLE_DIR="desktop/src-tauri/target/${{ matrix.target }}/release/bundle"

          # macOS — .dmg
          if [ -d "$BUNDLE_DIR/dmg" ]; then
            find "$BUNDLE_DIR/dmg" -name "*.dmg" -exec cp {} desktop-out/ \;
          fi
          # macOS — .app.tar.gz
          if [ -d "$BUNDLE_DIR/macos" ]; then
            find "$BUNDLE_DIR/macos" -name "*.app.tar.gz" -exec cp {} desktop-out/ \;
          fi

          # Linux — .deb
          if [ -d "$BUNDLE_DIR/deb" ]; then
            find "$BUNDLE_DIR/deb" -name "*.deb" -exec cp {} desktop-out/ \;
          fi
          # Linux — .AppImage
          if [ -d "$BUNDLE_DIR/appimage" ]; then
            find "$BUNDLE_DIR/appimage" -name "*.AppImage" -exec cp {} desktop-out/ \;
          fi
          # Linux — .rpm
          if [ -d "$BUNDLE_DIR/rpm" ]; then
            find "$BUNDLE_DIR/rpm" -name "*.rpm" -exec cp {} desktop-out/ \;
          fi

          # Windows — .exe (NSIS installer)
          if [ -d "$BUNDLE_DIR/nsis" ]; then
            find "$BUNDLE_DIR/nsis" -name "*.exe" -exec cp {} desktop-out/ \;
          fi
          # Windows — .msi
          if [ -d "$BUNDLE_DIR/msi" ]; then
            find "$BUNDLE_DIR/msi" -name "*.msi" -exec cp {} desktop-out/ \;
          fi

          # Rename to unified naming: mnemo-desktop-{label}.{ext}
          shopt -s nullglob
          files=(desktop-out/*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No desktop artifacts found in $BUNDLE_DIR" >&2
            find "$BUNDLE_DIR" -maxdepth 3 -type f -print 2>/dev/null || true
            exit 1
          fi
          for f in "${files[@]}"; do
            base="$(basename "$f")"
            case "$base" in
              *.app.tar.gz) ext="app.tar.gz" ;;
              *) ext="${base##*.}" ;;
            esac
            mv "$f" "desktop-out/mnemo-desktop-${{ matrix.desktop_label }}.${ext}"
          done
          ls -lh desktop-out/

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mnemo-desktop-${{ matrix.desktop_label }}
          path: desktop-out/*
          retention-days: 14
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────
  # Stage 3: Publish GitHub Release (only on v*.*.* tags)
  # ─────────────────────────────────────────────────────────────
  release:
    name: release
    needs: [build-cli, build-desktop]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout (for install scripts)
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Stage release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release

          # ── CLI binaries ──
          find artifacts -type f \( -name "mnemo-darwin-*" -o -name "mnemo-linux-*" -o -name "mnemo-windows-*" \) ! -name "*.sha256" -exec cp -v {} release/ \;

          # ── Install scripts ──
          cp scripts/install.sh release/install.sh
          cp scripts/install.ps1 release/install.ps1

          # ── Desktop installers ──
          find artifacts -type f \( -name "mnemo-desktop-*" \) -exec cp -v {} release/ \;

          # ── Release gate: website must have downloadable core assets ──
          required_files=(
            "mnemo-darwin-arm64"
            "mnemo-darwin-x86_64"
            "mnemo-linux-x86_64"
            "mnemo-windows-x86_64.exe"
            "install.sh"
            "install.ps1"
          )
          for required in "${required_files[@]}"; do
            if [ ! -f "release/$required" ]; then
              echo "Missing required release asset: $required" >&2
              exit 1
            fi
          done

          required_desktop_labels=(
            "macos-arm64"
            "macos-x86_64"
            "linux-x86_64"
            "windows-x86_64"
          )
          for label in "${required_desktop_labels[@]}"; do
            if ! find release -maxdepth 1 -type f -name "mnemo-desktop-$label.*" | grep -q .; then
              echo "Missing required desktop release asset for: $label" >&2
              exit 1
            fi
          done

          (
            cd release
            if command -v sha256sum >/dev/null; then
              find . -maxdepth 1 -type f ! -name "SHA256SUMS" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
            else
              find . -maxdepth 1 -type f ! -name "SHA256SUMS" -print0 | sort -z | xargs -0 shasum -a 256 > SHA256SUMS
            fi
          )

          # Summary
          echo "=== Release contents ==="
          ls -lh release/
          echo "========================"
          [ -f release/SHA256SUMS ] && cat release/SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
