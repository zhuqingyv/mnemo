<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>mnemo · 3D 知识图谱</title>
<style>
  :root {
    --bg-0: #0e1116;
    --bg-1: #151a21;
    --bg-2: #1c222b;
    --bg-3: #252c37;
    --border: #2a313c;
    --border-strong: #3a4250;
    --text-0: #e6edf3;
    --text-1: #b9c2cd;
    --text-2: #7d8693;
    --text-3: #565d68;
    --accent: #58a6ff;
    --accent-dim: #1f6feb;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --purple: #a371f7;
    --gray: #6e7681;
    --mono: "JetBrains Mono", "Fira Code", "SF Mono", "Menlo", "Consolas", monospace;
    --radius: 6px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: var(--bg-0); color: var(--text-0);
    font-family: var(--mono); font-size: 13px;
    overflow: hidden;
  }
  button { font-family: inherit; font-size: inherit; cursor: pointer; }

  /* ---------- topbar ---------- */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    height: 52px;
  }
  .brand { font-weight: 700; font-size: 14px; color: var(--text-0); letter-spacing: 0.5px; }
  .brand .dot { color: var(--accent); }
  .brand .hint { color: var(--text-3); font-size: 11px; margin-left: 4px; }

  .api-state {
    font-size: 11px; color: var(--text-2);
    padding: 4px 10px; background: var(--bg-2);
    border: 1px solid var(--border); border-radius: 4px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .api-state .dot-s { width: 8px; height: 8px; border-radius: 50%; background: var(--gray); }
  .api-state.ok .dot-s { background: var(--green); }
  .api-state.err .dot-s { background: var(--red); }

  .search-wrap { flex: 1; max-width: 520px; position: relative; }
  .search-wrap input {
    width: 100%; background: var(--bg-2); color: var(--text-0);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 8px 36px 8px 32px; font-family: var(--mono); font-size: 13px; outline: none;
  }
  .search-wrap input:focus { border-color: var(--accent-dim); box-shadow: 0 0 0 2px rgba(88,166,255,0.15); }
  .search-wrap .icon-search {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--text-2); pointer-events: none;
  }
  .search-wrap .clear-btn {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--text-3); padding: 2px 6px; border-radius: 4px;
  }
  .search-wrap .clear-btn:hover { color: var(--text-0); background: var(--bg-3); }

  .btn {
    background: var(--bg-2); color: var(--text-0);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 7px 12px;
  }
  .btn:hover { background: var(--bg-3); border-color: var(--border-strong); }

  /* ---------- graph canvas ---------- */
  #graph-container {
    position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
    background: var(--bg-0);
  }

  /* ---------- DOM label layer (2D screen-space, over canvas) ---------- */
  #label-layer {
    position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 35;               /* above canvas(30), below hud(40) / tooltip(60) */
  }
  .n-label {
    position: absolute;
    left: 0; top: 0;
    transform: translate3d(-9999px, -9999px, 0);  /* hidden initially */
    font-family: var(--mono);
    font-size: 10.5px;
    line-height: 1.1;
    color: var(--text-0);
    background: rgba(14,17,22,0.72);
    border-radius: 2px;
    padding: 1px 4px;
    white-space: nowrap;
    will-change: transform, opacity;
    pointer-events: none;
    user-select: none;
  }
  .n-label.hide { display: none; }

  /* ---------- HUD ---------- */
  .hud {
    position: fixed; left: 12px; top: 64px; z-index: 40;
    background: rgba(21,26,33,0.88);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px;
    min-width: 200px;
    backdrop-filter: blur(6px);
  }
  .hud h4 {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-3); margin: 0 0 6px 0; font-weight: 700;
  }
  .hud .kv {
    display: flex; justify-content: space-between;
    font-size: 11.5px; padding: 2px 0;
  }
  .hud .kv .k { color: var(--text-3); }
  .hud .kv .v { color: var(--text-0); font-weight: 600; font-variant-numeric: tabular-nums; }
  .hud .divider { height: 1px; background: var(--border); margin: 8px 0; }

  .legend { list-style: none; padding: 0; margin: 0; }
  .legend li { display: flex; align-items: center; gap: 6px; font-size: 10.5px; color: var(--text-1); padding: 1.5px 0; }
  .legend .swatch {
    width: 10px; height: 10px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.12);
    flex-shrink: 0;
  }
  .legend .line {
    width: 14px; height: 2px; border-radius: 1px; flex-shrink: 0;
  }

  /* ---------- tooltip ---------- */
  .tooltip {
    position: fixed; pointer-events: none; z-index: 60;
    background: rgba(21,26,33,0.96);
    border: 1px solid var(--border-strong);
    border-radius: 6px; padding: 8px 10px;
    font-size: 11.5px; color: var(--text-0);
    max-width: 260px;
    transform: translate(10px, 10px);
    opacity: 0; transition: opacity 120ms;
    backdrop-filter: blur(4px);
  }
  .tooltip.show { opacity: 1; }
  .tooltip .tt-title { font-weight: 700; margin-bottom: 3px; color: var(--text-0); }
  .tooltip .tt-meta { font-size: 10.5px; color: var(--text-2); }
  .tooltip .tt-meta .k { color: var(--text-3); }

  /* ---------- detail panel ---------- */
  .panel-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 80;
    display: none; align-items: flex-start; justify-content: flex-end;
  }
  .panel-overlay.show { display: flex; }
  .panel {
    width: 460px; max-width: 100vw; height: 100vh;
    background: var(--bg-1); border-left: 1px solid var(--border);
    overflow-y: auto; padding: 16px 18px;
    animation: slideIn 220ms ease-out;
    position: relative;
  }
  @keyframes slideIn {
    from { transform: translateX(20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  .panel h3 { margin: 0 0 10px 0; font-size: 15px; color: var(--text-0); padding-right: 48px; }
  .panel .close {
    position: absolute; top: 12px; right: 16px;
    background: transparent; border: 1px solid var(--border);
    color: var(--text-2); padding: 3px 8px; border-radius: 4px;
  }
  .panel .close:hover { color: var(--text-0); background: var(--bg-3); }
  .panel .meta { font-size: 11.5px; color: var(--text-2); margin-bottom: 12px; line-height: 1.7; }
  .panel .meta .k { color: var(--text-3); min-width: 80px; display: inline-block; }
  .panel .meta .v { color: var(--text-1); }
  .panel h4 {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--text-3); margin: 14px 0 6px 0; font-weight: 600;
  }
  .panel .content-box {
    font-size: 12px; line-height: 1.6; color: var(--text-0);
    background: var(--bg-0); border: 1px solid var(--border);
    border-radius: 4px; padding: 10px 12px; white-space: pre-wrap;
    word-break: break-word;
  }
  .panel .feedback-bar { display: flex; gap: 10px; margin-bottom: 14px; font-size: 11.5px; flex-wrap: wrap; }
  .panel .fb-pill {
    display: flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 12px;
    background: var(--bg-2); border: 1px solid var(--border);
  }
  .panel .fb-pill.helpful { color: var(--green); border-color: rgba(63,185,80,0.3); }
  .panel .fb-pill.misleading { color: var(--red); border-color: rgba(248,81,73,0.3); }
  .panel .fb-pill.outdated { color: var(--yellow); border-color: rgba(210,153,34,0.3); }
  .panel .fb-pill .fb-n { font-weight: 700; }
  .panel .rel-list { list-style: none; padding: 0; margin: 0; }
  .panel .rel-list li {
    display: flex; align-items: center; gap: 8px;
    font-size: 11.5px; padding: 5px 0;
    border-bottom: 1px solid var(--border);
  }
  .panel .rel-list li:last-child { border-bottom: none; }
  .panel .rel-badge {
    font-size: 10px; padding: 1px 6px; border-radius: 3px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
    flex-shrink: 0;
  }
  .panel .rel-badge.related { background: rgba(88,166,255,0.15); color: var(--accent); }
  .panel .rel-badge.contradicts { background: rgba(248,81,73,0.15); color: var(--red); }
  .panel .rel-badge.supersedes { background: rgba(163,113,247,0.15); color: var(--purple); }
  .panel .rel-badge.auto_related { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .panel .rel-title {
    color: var(--text-1); cursor: pointer; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; flex: 1;
  }
  .panel .rel-title:hover { color: var(--accent); }
  .panel .rel-weight { color: var(--text-3); font-size: 10px; flex-shrink: 0; }
  .panel .rel-dir { color: var(--text-3); font-size: 10px; flex-shrink: 0; width: 14px; text-align: center; }
  .panel .superseded-banner {
    background: rgba(163,113,247,0.1); border: 1px solid rgba(163,113,247,0.3);
    border-radius: 6px; padding: 8px 12px; margin-bottom: 12px;
    font-size: 11.5px; color: var(--purple);
  }
  .panel .superseded-banner a { color: var(--purple); font-weight: 600; cursor: pointer; text-decoration: underline; }

  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--border-strong);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state-row { padding: 60px 0; text-align: center; color: var(--text-2); font-size: 13px; }
  .err {
    color: var(--red); background: rgba(248,81,73,0.08);
    border: 1px solid rgba(248,81,73,0.3);
    padding: 10px 14px; border-radius: 6px;
    font-size: 12px;
  }

  /* ---------- loading overlay ---------- */
  .loader {
    position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 30; pointer-events: none;
    color: var(--text-2); font-size: 13px;
  }
  .loader.hide { display: none; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">mnemo<span class="dot">·</span>3D <span class="hint">v0</span></div>
  <div class="api-state" id="api-state"><span class="dot-s"></span><span id="api-state-text">connecting…</span></div>
  <div class="search-wrap">
    <span class="icon-search">⌕</span>
    <input id="search-input" placeholder="search (title / summary / content)…" autocomplete="off" />
    <button class="clear-btn" id="search-clear" style="display:none" title="clear">×</button>
  </div>
  <button class="btn" id="btn-refresh" title="refresh graph">↻ refresh</button>
</div>

<div id="graph-container"></div>
<div id="label-layer"></div>

<div class="loader" id="loader"><span class="spinner"></span>loading graph…</div>

<div class="hud" id="hud">
  <h4>Graph</h4>
  <div class="kv"><span class="k">nodes</span><span class="v" id="hud-nodes">—</span></div>
  <div class="kv"><span class="k">edges</span><span class="v" id="hud-edges">—</span></div>
  <div class="kv"><span class="k">projects</span><span class="v" id="hud-projects">—</span></div>
  <div class="divider"></div>
  <h4>Nodes</h4>
  <ul class="legend">
    <li><span class="swatch" style="background:#58a6ff"></span>global</li>
    <li><span class="swatch" style="background:#3fb950"></span>project (color by name)</li>
    <li><span class="swatch" style="background:#d29922"></span>stale</li>
    <li><span class="swatch" style="background:#6e7681"></span>superseded / archived</li>
  </ul>
  <div class="divider"></div>
  <h4>Edges</h4>
  <ul class="legend">
    <li><span class="line" style="background:#58a6ff"></span>related</li>
    <li><span class="line" style="background:#d29922"></span>auto_related</li>
    <li><span class="line" style="background:#a371f7"></span>supersedes</li>
    <li><span class="line" style="background:#f85149;height:3px"></span>contradicts</li>
  </ul>
</div>

<div class="tooltip" id="tooltip"></div>

<div class="panel-overlay" id="panel-overlay">
  <div class="panel" id="panel">
    <button class="close" id="panel-close">esc</button>
    <div id="panel-body"></div>
  </div>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/3d-force-graph@1.73.4/dist/3d-force-graph.min.js"></script>

<script>
(function(){
  'use strict';

  const _origin = (location.protocol === 'file:') ? 'http://127.0.0.1:8787' : location.origin;
  const API = _origin + '/api/v1';

  const state = {
    knowledge: [],
    relations: [],
    stats: null,
    graph: null,
    nodesById: new Map(),
    projectNames: new Set(),
    hoveredId: null,
    selectedId: null,
    searchMatchIds: new Set(),
    labelDistance: 120,
    cameraDistance: 400,
    labels: new Map(),         // node.id -> <div> for 2D DOM overlay
    hoveredNode: null,
  };

  /* ---------- utils ---------- */
  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }
  function escapeAttr(s){ return escapeHtml(s); }

  async function apiGet(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  }

  function formatTimeAgo(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    const now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 60) return Math.floor(diff) + '秒前';
    if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
    if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
    return Math.floor(diff / 86400) + '天前';
  }

  /* ---------- color mapping ---------- */
  const PROJECT_HUES = [210, 140, 30, 280, 350, 170, 60, 310, 100, 240, 0, 190, 330, 80, 260];
  const _projectColorCache = {};
  let _projectColorIdx = 0;
  function projectColor(name) {
    if (!name) return null;
    if (_projectColorCache[name]) return _projectColorCache[name];
    const hue = PROJECT_HUES[_projectColorIdx % PROJECT_HUES.length];
    _projectColorIdx++;
    _projectColorCache[name] = 'hsl(' + hue + ', 65%, 55%)';
    return _projectColorCache[name];
  }
  function nodeColor(n) {
    const status = n.status || 'active';
    if (status === 'stale') return '#d29922';
    if (status === 'superseded' || status === 'archived') return '#6e7681';
    const pc = projectColor(n.project_name);
    if (pc) return pc;
    const scope = n.scope || 'global';
    if (scope === 'global') return '#58a6ff';
    if (scope === 'session') return '#6e7681';
    return '#3fb950';
  }
  const EDGE_STYLES = {
    related:      { color: 'rgba(88,166,255,0.35)', width: 0.6 },
    auto_related: { color: 'rgba(210,153,34,0.38)', width: 0.5 },
    supersedes:   { color: '#a371f7',                width: 1.2 },
    contradicts:  { color: '#f85149',                width: 2.2 },
  };
  function edgeStyle(t) { return EDGE_STYLES[t] || EDGE_STYLES.related; }

  /* ---------- API state indicator ---------- */
  async function probeHealth() {
    const el = document.getElementById('api-state');
    const txt = document.getElementById('api-state-text');
    try {
      await apiGet(API + '/stats');
      el.classList.remove('err'); el.classList.add('ok');
      txt.textContent = 'online';
    } catch (e) {
      el.classList.remove('ok'); el.classList.add('err');
      txt.textContent = 'offline';
    }
  }

  /* ---------- data fetching ---------- */
  async function fetchAll() {
    const [kRes, rRes, sRes] = await Promise.all([
      apiGet(API + '/knowledge?limit=500'),
      apiGet(API + '/relations?limit=5000'),
      apiGet(API + '/stats').catch(() => null),
    ]);
    state.knowledge = kRes.results || [];
    state.relations = rRes.results || [];
    state.stats = sRes;
    state.nodesById.clear();
    state.projectNames.clear();
    for (const k of state.knowledge) {
      state.nodesById.set(k.id, k);
      if (k.project_name) state.projectNames.add(k.project_name);
    }
  }

  /* ---------- build graph data ---------- */
  function buildGraphData() {
    const idSet = new Set(state.knowledge.map(k => k.id));
    const nodes = state.knowledge.map(k => ({
      id: k.id,
      title: k.title || '(no title)',
      project_name: k.project_name || null,
      scope: k.scope || 'global',
      status: k.status || 'active',
      claim_type: k.claim_type || null,
      tags: k.tags || [],
      summary: k.summary || '',
      _contentLen: (k.summary || '').length + (k.content || '').length,
    }));
    const seenEdge = new Set();
    const links = [];
    for (const r of state.relations) {
      if (!idSet.has(r.source_id) || !idSet.has(r.target_id)) continue;
      if (r.source_id === r.target_id) continue;
      const a = Math.min(r.source_id, r.target_id);
      const b = Math.max(r.source_id, r.target_id);
      const key = a + '-' + b + '-' + r.relation_type;
      if (seenEdge.has(key)) continue;
      seenEdge.add(key);
      links.push({
        id: r.id,
        source_id: r.source_id,
        target_id: r.target_id,
        relation_type: r.relation_type || 'related',
        weight: r.weight == null ? 1 : r.weight,
      });
    }
    const edgeCounts = {};
    for (const l of links) {
      edgeCounts[l.source_id] = (edgeCounts[l.source_id] || 0) + 1;
      edgeCounts[l.target_id] = (edgeCounts[l.target_id] || 0) + 1;
    }
    for (const n of nodes) {
      n._edgeCount = edgeCounts[n.id] || 0;
    }
    return { nodes, links };
  }

  /* ---------- DOM label overlay ----------
   * 2D screen-space labels: one <div> per node, placed in #label-layer.
   * Position is computed each frame by projecting the node's world position
   * through the camera (vector.project). Far nodes are hidden.
   * Replaces the previous three-spritetext implementation, so labels:
   *   - render at constant DOM font size (no 3D perspective scaling)
   *   - always face the screen
   *   - sit above the canvas (never occluded by 3D geometry)
   */
  function truncTitle(t) {
    if (!t) return '';
    if (t.length <= 20) return t;
    return t.slice(0, 18) + '…';
  }

  function rebuildLabels(nodes) {
    const layer = document.getElementById('label-layer');
    if (!layer) return;
    // remove old
    layer.innerHTML = '';
    state.labels = new Map();
    for (const n of nodes) {
      const el = document.createElement('div');
      el.className = 'n-label hide';
      el.textContent = truncTitle(n.title);
      layer.appendChild(el);
      state.labels.set(n.id, el);
    }
  }

  /* ---------- graph wiring ---------- */
  function initGraph() {
    const container = document.getElementById('graph-container');
    const G = ForceGraph3D()(container)
      .backgroundColor('#0e1116')
      .nodeId('id')
      .linkSource('source_id')
      .linkTarget('target_id')
      .nodeRelSize(7)
      .nodeVal(n => {
        if (state.selectedId === n.id) return 4;
        if (state.searchMatchIds.size && state.searchMatchIds.has(n.id)) return 3;
        var edges = Math.min(n._edgeCount || 0, 20);
        var content = Math.min((n._contentLen || 0) / 200, 5);
        return 1 + edges * 0.3 + content * 0.2;
      })
      .nodeColor(n => {
        if (state.selectedId === n.id) return '#ffffff';
        if (state.hoveredId === n.id) return '#ffffff';
        if (state.searchMatchIds.size && state.searchMatchIds.has(n.id)) return '#ffffff';
        return nodeColor(n);
      })
      .nodeOpacity(0.95)
      .nodeLabel(n => {
        const parts = [
          '<div style="font-family:monospace;font-size:12px;padding:2px 4px;max-width:280px">',
          '<div style="font-weight:700">' + escapeHtml(n.title) + '</div>',
          '<div style="color:#b9c2cd;font-size:10.5px;margin-top:2px">',
          (n.project_name ? ('project=' + escapeHtml(n.project_name)) : ('scope=' + escapeHtml(n.scope))),
          ' · status=' + escapeHtml(n.status),
          (n.claim_type ? ' · ' + escapeHtml(n.claim_type) : ''),
          '</div></div>',
        ];
        return parts.join('');
      })
      .linkColor(l => edgeStyle(l.relation_type).color)
      .linkWidth(l => edgeStyle(l.relation_type).width)
      .linkOpacity(0.55)
      .linkDirectionalParticles(l => (l.relation_type === 'contradicts' || l.relation_type === 'supersedes') ? 2 : 0)
      .linkDirectionalParticleSpeed(0.008)
      .linkDirectionalParticleWidth(1.4)
      .linkDirectionalParticleColor(l => edgeStyle(l.relation_type).color)
      .cooldownTicks(200)
      .d3AlphaDecay(0.04)
      .d3VelocityDecay(0.35)
      .warmupTicks(30)
      .onEngineStop(() => {
        if (G.pauseAnimation) G.pauseAnimation();
      })
      .onNodeHover(n => {
        const prev = state.hoveredNode;
        state.hoveredId = n ? n.id : null;
        state.hoveredNode = n || null;
        container.style.cursor = n ? 'pointer' : null;
        // Recolor only prev + current node's material (avoid 500-node full recompute)
        const applyColor = (node) => {
          if (!node) return;
          const obj = node.__threeObj;
          if (!obj) return;
          // default node is a Mesh with material; fallback to first child that has one
          const target = (obj.material ? obj : (obj.children && obj.children.find(c => c && c.material && c.material.color)));
          if (target && target.material && target.material.color) {
            let c;
            if (state.selectedId === node.id) c = '#ffffff';
            else if (state.hoveredId === node.id) c = '#ffffff';
            else if (state.searchMatchIds.size && state.searchMatchIds.has(node.id)) c = '#ffffff';
            else c = nodeColor(node);
            target.material.color.set(c);
          }
        };
        if (prev && prev !== n) applyColor(prev);
        if (n) applyColor(n);
      })
      .onNodeClick(n => {
        if (!n) return;
        openDetail(n.id);
        const dist = 80;
        const r = Math.hypot(n.x || 0, n.y || 0, n.z || 0) || 1;
        G.cameraPosition(
          { x: (n.x || 0) * (1 + dist/r), y: (n.y || 0) * (1 + dist/r), z: (n.z || 0) * (1 + dist/r) },
          n, 700
        );
      });

    // per-frame: reposition DOM labels from projected world→screen coords.
    // Runs during physics via onEngineTick, and when user orbits via controls 'change'.
    // No independent requestAnimationFrame loop (would burn CPU forever after engine stops).
    G.onEngineTick(() => updateLabels(G));
    try {
      const controls = G.controls && G.controls();
      if (controls && controls.addEventListener) {
        controls.addEventListener('change', () => updateLabels(G));
      }
    } catch (_) { /* controls may not be ready yet; onEngineTick covers init */ }

    // Spread out dense clusters (e.g. projects with many children like mcp-team-hub).
    // Default charge strength is ~-30; we push it harder for a looser layout.
    try {
      const charge = G.d3Force && G.d3Force('charge');
      if (charge && charge.strength) charge.strength(-140);
      const link = G.d3Force && G.d3Force('link');
      if (link && link.distance) link.distance(90);
    } catch (_) { /* force accessors unavailable on this version */ }

    return G;
  }

  // reused scratch vector — avoid allocating per-node per-frame
  const _scratchVec = (typeof THREE !== 'undefined') ? new THREE.Vector3() : null;

  // Project each node's world position into screen space and position its DOM label.
  // Hides nodes that are (a) behind the camera, (b) off-screen, or (c) beyond
  // `state.labelDistance` from the camera.
  function updateLabels(G) {
    if (!G || !state.labels || state.labels.size === 0) return;
    const cam = G.camera && G.camera();
    if (!cam) return;
    const layer = document.getElementById('label-layer');
    if (!layer) return;
    const w = layer.clientWidth;
    const h = layer.clientHeight;
    if (!w || !h) return;
    const halfW = w * 0.5, halfH = h * 0.5;
    const threshold = state.labelDistance;
    const camPos = cam.position;
    const v = _scratchVec || new THREE.Vector3();

    // Ensure camera matrices are current — needed when called outside render loop.
    cam.updateMatrixWorld();

    const nodes = G.graphData ? G.graphData().nodes : [];
    for (const n of nodes) {
      const el = state.labels.get(n.id);
      if (!el) continue;
      if (n.x == null || n.y == null || n.z == null) {
        if (!el.classList.contains('hide')) el.classList.add('hide');
        continue;
      }
      // distance cull
      const dx = n.x - camPos.x, dy = n.y - camPos.y, dz = n.z - camPos.z;
      const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
      if (dist > threshold) {
        if (!el.classList.contains('hide')) el.classList.add('hide');
        continue;
      }
      v.set(n.x, n.y, n.z).project(cam);
      // v.z > 1 or < -1 means behind camera / beyond far plane
      if (v.z < -1 || v.z > 1) {
        if (!el.classList.contains('hide')) el.classList.add('hide');
        continue;
      }
      const sx = v.x * halfW + halfW;
      const sy = -v.y * halfH + halfH;
      // frustum cull (outside viewport)
      if (sx < -40 || sx > w + 40 || sy < -20 || sy > h + 20) {
        if (!el.classList.contains('hide')) el.classList.add('hide');
        continue;
      }
      if (el.classList.contains('hide')) el.classList.remove('hide');
      // center-top anchor: label sits just above the node
      el.style.transform = 'translate3d(' + Math.round(sx) + 'px,' + Math.round(sy - 10) + 'px,0) translate(-50%, -100%)';
    }
  }

  /* ---------- HUD ---------- */
  function renderHUD() {
    document.getElementById('hud-nodes').textContent = state.knowledge.length;
    document.getElementById('hud-edges').textContent = state.relations.length;
    document.getElementById('hud-projects').textContent = state.projectNames.size;
  }

  /* ---------- detail panel ---------- */
  function renderFeedbackBar(fb) {
    fb = fb || { helpful:0, misleading:0, outdated:0 };
    return '<div class="feedback-bar">' +
      '<div class="fb-pill helpful"><span class="fb-n">' + (fb.helpful|0) + '</span> helpful</div>' +
      '<div class="fb-pill misleading"><span class="fb-n">' + (fb.misleading|0) + '</span> misleading</div>' +
      '<div class="fb-pill outdated"><span class="fb-n">' + (fb.outdated|0) + '</span> outdated</div>' +
    '</div>';
  }

  function renderRelations(rels) {
    if (!rels || rels.length === 0) return '<div style="color:var(--text-3);font-size:11px">无关联</div>';
    return '<ul class="rel-list">' + rels.map(r => {
      const arrow = r.direction === 'outgoing' ? '→' : '←';
      const badge = r.relation_type || 'related';
      const w = r.weight != null ? ('w=' + r.weight) : '';
      return '<li>' +
        '<span class="rel-dir">' + arrow + '</span>' +
        '<span class="rel-badge ' + escapeHtml(badge) + '">' + escapeHtml(badge) + '</span>' +
        '<span class="rel-title" data-id="' + r.peer_id + '">' + escapeHtml(r.peer_title || ('#' + r.peer_id)) + '</span>' +
        (w ? '<span class="rel-weight">' + w + '</span>' : '') +
      '</li>';
    }).join('') + '</ul>';
  }

  async function openDetail(id) {
    state.selectedId = id;
    if (state.graph) state.graph.nodeColor(state.graph.nodeColor());
    const overlay = document.getElementById('panel-overlay');
    const body = document.getElementById('panel-body');
    overlay.classList.add('show');
    body.innerHTML = '<div class="state-row"><span class="spinner"></span>loading…</div>';
    try {
      const k = await apiGet(API + '/knowledge/' + id + '/detail');
      let supersededHtml = '';
      if (k.superseded_by) {
        supersededHtml = '<div class="superseded-banner">已被取代 → <a data-id="' +
          k.superseded_by.id + '">' + escapeHtml(k.superseded_by.title) + '</a></div>';
      }
      body.innerHTML =
        '<h3>' + escapeHtml(k.title) + '</h3>' +
        supersededHtml +
        '<div class="meta">' +
          '<div><span class="k">id</span><span class="v">' + k.id + '</span></div>' +
          '<div><span class="k">status</span><span class="v">' + escapeHtml(k.status || '') + '</span></div>' +
          '<div><span class="k">scope</span><span class="v">' + escapeHtml(k.scope || '') + '</span></div>' +
          (k.claim_type ? '<div><span class="k">claim_type</span><span class="v">' + escapeHtml(k.claim_type) + '</span></div>' : '') +
          (k.project_name ? '<div><span class="k">project</span><span class="v">' + escapeHtml(k.project_name) + '</span></div>' : '') +
          '<div><span class="k">version</span><span class="v">v' + k.version + '</span></div>' +
          '<div><span class="k">created</span><span class="v">' + escapeHtml((k.created_at || '').slice(0, 19)) + '</span></div>' +
          '<div><span class="k">updated</span><span class="v">' + escapeHtml((k.updated_at || '').slice(0, 19)) + '</span></div>' +
          (k.last_accessed_at ? '<div><span class="k">last hit</span><span class="v">' + formatTimeAgo(k.last_accessed_at) + '</span></div>' : '') +
          (k.source ? '<div><span class="k">source</span><span class="v">' + escapeHtml(k.source) + '</span></div>' : '') +
          '<div><span class="k">tags</span><span class="v">' + (k.tags || []).map(t => '#' + escapeHtml(t)).join(' ') + '</span></div>' +
        '</div>' +
        '<h4>feedback</h4>' +
        renderFeedbackBar(k.feedback) +
        '<h4>relations (' + (k.relations || []).length + ')</h4>' +
        renderRelations(k.relations) +
        '<h4>summary</h4>' +
        '<div class="content-box">' + escapeHtml(k.summary || '') + '</div>' +
        '<h4>content</h4>' +
        '<div class="content-box">' + escapeHtml(k.content || '(no content)') + '</div>';

      body.querySelectorAll('.rel-title[data-id]').forEach(el => {
        el.addEventListener('click', () => openDetail(parseInt(el.dataset.id, 10)));
      });
      body.querySelectorAll('.superseded-banner a[data-id]').forEach(el => {
        el.addEventListener('click', () => openDetail(parseInt(el.dataset.id, 10)));
      });
    } catch (e) {
      body.innerHTML = '<div class="err">加载失败: ' + escapeHtml(e.message) + '</div>';
    }
  }

  function closeDetail() {
    state.selectedId = null;
    if (state.graph) state.graph.nodeColor(state.graph.nodeColor());
    document.getElementById('panel-overlay').classList.remove('show');
  }

  /* ---------- search ---------- */
  let searchDebounce = null;
  function onSearchInput(e) {
    const v = e.target.value;
    document.getElementById('search-clear').style.display = v ? '' : 'none';
    clearTimeout(searchDebounce);
    if (!v.trim()) {
      state.searchMatchIds = new Set();
      if (state.graph) state.graph.nodeColor(state.graph.nodeColor());
      return;
    }
    searchDebounce = setTimeout(() => runSearch(v), 220);
  }
  let searchController = null;
  async function runSearch(q) {
    // Cancel any in-flight request so results can't land out-of-order and
    // overwrite newer matches (R4 race condition).
    if (searchController) searchController.abort();
    searchController = new AbortController();
    const mySignal = searchController.signal;
    try {
      const url = API + '/knowledge/search?query=' + encodeURIComponent(q) + '&limit=50';
      const r = await fetch(url, { signal: mySignal });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      if (mySignal.aborted) return;
      const ids = new Set((data.results || []).map(r => r.id));
      state.searchMatchIds = ids;
      if (state.graph && ids.size > 0) {
        const first = (data.results || [])[0];
        if (first) {
          const node = state.graph.graphData().nodes.find(n => n.id === first.id);
          if (node && node.x !== undefined) {
            const r = Math.hypot(node.x, node.y, node.z) || 1;
            const dist = 140;
            state.graph.cameraPosition(
              { x: node.x * (1 + dist/r), y: node.y * (1 + dist/r), z: node.z * (1 + dist/r) },
              node, 700
            );
            if (state.graph.resumeAnimation) state.graph.resumeAnimation();
          }
        }
        state.graph.nodeColor(state.graph.nodeColor());
      }
    } catch (e) {
      if (e.name === 'AbortError') return; // superseded by a newer search
      console.warn('search failed', e);
    }
  }

  /* ---------- boot ---------- */
  async function boot() {
    await probeHealth();
    try {
      await fetchAll();
    } catch (e) {
      document.getElementById('loader').innerHTML =
        '<div class="err">加载失败: ' + escapeHtml(e.message) + '</div>';
      return;
    }

    state.graph = initGraph();
    const data = buildGraphData();
    state.graph.graphData(data);
    rebuildLabels(data.nodes);

    // adapt label distance to graph size
    state.labelDistance = Math.max(80, Math.min(260, 60 + data.nodes.length * 0.25));

    renderHUD();
    document.getElementById('loader').classList.add('hide');

    // resize
    window.addEventListener('resize', () => {
      const c = document.getElementById('graph-container');
      state.graph.width(c.clientWidth);
      state.graph.height(c.clientHeight);
      updateLabels(state.graph);
    });

    // refresh button
    document.getElementById('btn-refresh').addEventListener('click', async () => {
      document.getElementById('loader').classList.remove('hide');
      try {
        await fetchAll();
        const d = buildGraphData();
        state.graph.graphData(d);
        rebuildLabels(d.nodes);
        state.labelDistance = Math.max(80, Math.min(260, 60 + d.nodes.length * 0.25));
        renderHUD();
        if (state.graph.resumeAnimation) state.graph.resumeAnimation();
      } catch (e) {
        alert('刷新失败: ' + e.message);
      } finally {
        document.getElementById('loader').classList.add('hide');
      }
    });

    // search wiring
    document.getElementById('search-input').addEventListener('input', onSearchInput);
    document.getElementById('search-clear').addEventListener('click', () => {
      const inp = document.getElementById('search-input');
      inp.value = '';
      onSearchInput({ target: inp });
      inp.focus();
    });

    // panel wiring
    document.getElementById('panel-close').addEventListener('click', closeDetail);
    document.getElementById('panel-overlay').addEventListener('click', (e) => {
      if (e.target.id === 'panel-overlay') closeDetail();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeDetail();
    });
  }

  boot();
})();
</script>
</body>
</html>
